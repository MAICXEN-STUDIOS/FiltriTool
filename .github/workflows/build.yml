name: Build Release Windows e Mac

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ==========================================
  # LAVORATORE 1: COMPILAZIONE WINDOWS
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout del codice
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installazione dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compilazione con PyInstaller (Windows)
      # Aggiunto il nuovo nome e l'icona .ico
      run: |
        pyinstaller --windowed --name "FiltriTool" --icon="icona.ico" --hidden-import=requests --hidden-import=packaging main.py

    - name: Creazione archivio .zip
      # Modificata la cartella e il nome del file finale
      run: |
        Compress-Archive -Path dist\FiltriTool -DestinationPath dist\FiltriTool_Win.zip

    - name: Caricamento .zip nella Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/FiltriTool_Win.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # LAVORATORE 2: COMPILAZIONE MAC
  # ==========================================
  build-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout del codice
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installazione dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compilazione con PyInstaller (Mac)
      # Aggiunto il nuovo nome e l'icona .icns
      run: |
        pyinstaller --windowed --name "FiltriTool" --icon="icona.icns" --hidden-import=requests --hidden-import=packaging main.py

    - name: Creazione archivio .zip per Auto-Updater
      # Modificato per zippare la nuova .app
      run: |
        cd dist
        zip -r FiltriTool_Mac.zip "FiltriTool.app"

    - name: Caricamento .zip nella Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/FiltriTool_Mac.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}