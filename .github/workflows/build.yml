name: Build Release Windows e Mac

on:
  push:
    tags:
      - 'v*' # Si attiva solo quando crei un tag versione (es. v1.1.0)

jobs:
  # ==========================================
  # LAVORATORE 1: COMPILAZIONE WINDOWS
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout del codice
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installazione dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compilazione con PyInstaller (Windows)
      run: |
        pyinstaller --windowed --name "FiltriTool" --icon="icona.icns" --hidden-import=requests --hidden-import=packaging main.py

    - name: Caricamento .exe nella Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/FiltriTool.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # LAVORATORE 2: COMPILAZIONE MAC
  # ==========================================
  build-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout del codice
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installazione dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compilazione con PyInstaller (Mac)
      # Nota: se in futuro aggiungi l'icona nel repository, puoi aggiungere --icon=icona.icns qui
      run: |
        pyinstaller --windowed --name "FiltriTool" --icon="icona.icns" --hidden-import=requests --hidden-import=packaging main.py

    - name: Creazione archivio .zip per Auto-Updater
      # Entriamo nella cartella dist e zippiamo la .app esattamente come faresti col tasto destro
      run: |
        cd dist
        zip -r FiltriTool_mac.zip "FiltriTool.app"

    - name: Caricamento .zip nella Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/FiltriTool_mac.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}